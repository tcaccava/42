server {
    server_name localhost;
    listen 3030;
    host localhost;
    host 127.0.0.1;
    root /var/www;
    client_max_body_size 1500;
    allow GET POST DELETE;

    # Error pages
    error_page 400 /error_page/400.html;
    error_page 403 /error_page/403.html;
    error_page 404 /error_page/404.html;
    error_page 500 /error_page/500.html;

    # ROOT LOCATION - This fixes the 400 Bad Request
    location / {
        root /var/www;
        autoindex on;
        index index.html;
        allow GET POST DELETE;
}


    # Test directory for autoindex development
    location /autoindex-test {
        allow GET POST DELETE;
        root /var/www;
        autoindex on;
    }

    # Directory listing test location
    location /dir-listing {
        allow GET POST DELETE;
        root /var/www;
        autoindex on;
        index index.html;
    }

    # File browser test location
    location /file-browser {
        allow GET POST DELETE;
        root /var/www;
        autoindex on;
    }

    # Upload development test
    location /upload-dev {
        upload_dir /var/www/uploads;
        allow GET POST DELETE;
        root /var/www;
        autoindex on;
    }
}
