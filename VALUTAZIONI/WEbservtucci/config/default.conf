server {
	server_name example.com www.example.com example.org www.example.org;
	listen 8080;
	root /var/www;
	autoindex on;
	host localhost;
	host 127.0.0.1;
	cgi_extension .py .php .pl;

	allow GET POST DELETE;

	client_max_body_size 50000000;

	# -------------------------
	#		  ERROR PAGES
	# -------------------------
	error_page 400 /errors/400.html;
	error_page 401 /errors/401.html;
	error_page 403 /errors/403.html;
	error_page 404 /errors/404.html;
	error_page 405 /errors/405.html;
	error_page 415 /errors/415.html;
	error_page 500 /errors/500.html;
	error_page 502 /errors/502.html;
	error_page 503 /errors/503.html;
	error_page 504 /errors/504.html;

	# -------------------------
	#		 STATIC CONTENT
	# -------------------------

	location / {
		cgi_extension .py;
		index index.html;
		autoindex on;
	}

	location /test {
		index tests.html;
		autoindex on;
	}

	location /autoindex {
		allow GET;
		autoindex on;
	}

	location /redirections {
		allow GET;
		autoindex on;
	}

	location /test-redirects {
		return 301 /redirections/test-redirects.html;
	}

	location /assets {
		autoindex on;
	}

	location /forbidden {
		autoindex off;
		allow GET;
	}

	location /not-allowed {
		allow POST;
	}

	location /server-error {
		allow GET POST;
		autoindex on;
		upload_dir /var/www/no;
	}

	# -------------------------
	#		  CGI SUPPORT
	# -------------------------

	location /cgi {
		cgi_extension .pl .py .php .sh;
		autoindex on;
	}

	# -------------------------
	#		FILE UPLOADS
	# -------------------------

	location /file {
		upload_dir /var/www/uploads/file;
		root /var/www;
		allow POST;
		autoindex on;
	}

	location /raw {
		upload_dir /var/www/uploads/raw;
		root /var/www;
		allow POST;
		autoindex on;
	}

	location /json {
		upload_dir /var/www/uploads/json;
		root /var/www;
		allow POST;
		autoindex on;
	}

	location /uploads {
		allow GET DELETE;
		autoindex on;
	}

	# -------------------------
	#		REDIRECTIONS
	# -------------------------

	# 301 - Permanent Redirect (per cambio URL definitivo)
	location /old-home {
		return 301 /;
	}

	location /old-about-page {
		return 301 /redirections/about.html;
	}

	# 302 - Temporary Redirect (per manutenzione temporanea)
	location /maintenance {
		return 302 /redirections/maintenance.html;
	}

	location /temp-moved {
		return 302 /test/;
	}

	# 307 - Temporary + Preserve Method (per API temporanei)
	location /legacy-upload {
		return 307 /file;
	}

	location /old-api {
		return 307 /cgi/hello.py;
	}

	# 308 - Permanent + Preserve Method (per API spostati definitivamente)
	location /upload-v1 {
		return 308 /file;
	}

	location /api-v1 {
		return 308 /cgi/hello.py;
	}

	# Redirect esterni (per testing completo)
	location /external-redirect {
		return 301 https://google.com;
	}

	location /github {
		return 302 https://github.com;
	}
}
